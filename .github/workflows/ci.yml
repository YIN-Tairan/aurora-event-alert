name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  lint:
    name: Lint & Syntax Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install flake8
        run: pip install flake8

      - name: Check Python syntax
        run: |
          echo "Checking syntax for all Python files..."
          for f in *.py; do
            python -m py_compile "$f" && echo "  OK: $f"
          done

      - name: Lint with flake8 (errors only)
        run: |
          # Fail on syntax errors, undefined names, and other critical issues
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Lint with flake8 (style warnings)
        run: |
          # Report style issues as warnings without failing the build
          flake8 . --count --exit-zero --max-line-length=127 --statistics \
            --exclude=__pycache__,.git
